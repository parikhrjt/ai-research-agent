services:
  db:
    image: pgvector/pgvector:pg16
    container_name: research-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-research}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-research}
      POSTGRES_DB: ${POSTGRES_DB:-research_agent}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U research -d research_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: research-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: research-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://research:research@db:5432/research_agent
      POSTGRES_HOST: db
      OLLAMA_BASE_URL: http://ollama:11434
      VECTOR_STORE: pgvector
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  ui:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: research-ui
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy

  # One-shot service to pull the Ollama model on first run
  ollama-pull:
    image: ollama/ollama:latest
    container_name: research-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c", "ollama pull llama3.2 || true"]
    environment:
      OLLAMA_HOST: http://ollama:11434
    network_mode: "service:ollama"
    restart: "no"

volumes:
  pgdata:
  ollama_data:
